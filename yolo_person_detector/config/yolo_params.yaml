# YOLO Person Detector Configuration
# For Agibot X2 Robot

yolo_detector:
  ros__parameters:
    # Model settings
    model_path: "yolov8n.pt"
    confidence_threshold: 0.5
    nms_threshold: 0.45
    device: "cpu"  # "cuda" for GPU, "cpu" for CPU, "mps" for Apple Silicon
    input_size: 640

    # Input topic: normally left as /yolo/input_image (republished by
    # camera_selector_node). Overridden here only if you want yolo_detector
    # to subscribe directly to a HAL camera topic, bypassing the selector.
    input_topic: "/yolo/input_image"

    # Visualization
    publish_annotated: true

camera_selector:
  ros__parameters:
    # Available cameras:
    #   rgb_head_front_center   - front-facing RGB camera
    #   rgb_head_rear           - rear-facing RGB camera
    #   stereo_head_front_left  - left stereo camera (default; confirmed publishing on this robot)
    #   stereo_head_front_right - right stereo camera
    active_camera: "stereo_head_front_left"

    # Input stream format. Mirrors echo_camera_rgbd's topic_type:
    #   rgb_image            - raw sensor_msgs/Image
    #   rgb_image_compressed - sensor_msgs/CompressedImage (JPEG, decoded here)
    topic_type: "rgb_image"

    timeout_sec: 2.0
    discovery_retry_sec: 2.0

    # Escape hatches for non-standard HAL deployments. Leave empty to use
    # the per-camera defaults from CAMERA_LAYOUTS.
    image_topic_override: ""
    info_topic_override: ""

yolo_visualization:
  ros__parameters:
    bbox_color_r: 0
    bbox_color_g: 255
    bbox_color_b: 0
    bbox_thickness: 2
    show_confidence: true
    font_scale: 0.6

person_follower:
  ros__parameters:
    # SAFETY: follower is disabled by default.
    # Enable either at launch (follower_enabled:=true) or at runtime by
    # publishing std_msgs/Bool(true) on /yolo/follower/enable.
    enabled: false

    # When true, the follower walks the X2 motion-mode state machine itself
    # (DD -> JD -> SD) via SetMcAction before it starts publishing velocity.
    # Set to false if another tool (e.g. `ros2 run py_examples set_mc_action SD`)
    # is already responsible for putting the robot in Stable Stand.
    auto_enable_locomotion: true

    # Control gains (visual servoing, no depth required)
    target_bbox_height_ratio: 0.6   # Target person height as fraction of image height
    forward_gain: 0.8               # Forward error -> velocity gain
    angular_gain: 1.5               # Horizontal error -> angular velocity gain

    # Velocity limits (robot min/max thresholds, see mc_locomotion_velocity.py)
    max_forward_speed: 0.6          # m/s  (robot supports up to 1.0)
    min_forward_speed: 0.2          # m/s  (robot min threshold)
    max_angular_speed: 0.8          # rad/s (robot supports up to 1.0)
    min_angular_speed: 0.1          # rad/s (robot min threshold)

    # Behavior
    center_deadzone_px: 50          # Ignore small horizontal errors
    watchdog_timeout_sec: 0.5       # Stop robot if no detection for this duration
    control_rate_hz: 20.0           # Control loop rate
    image_width: 640                # Auto-updated from input stream
    image_height: 480
